spring.application.name=PlanningLedger

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/rpl}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rpl}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rpl}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080